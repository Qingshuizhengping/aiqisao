name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dump environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          javac -version 2>&1 || true
          ls "$ANDROID_HOME/platforms/" 2>/dev/null || echo "no platforms"
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "no build-tools"

      - name: Generate offline HTML
        run: node build_offline_html.js

      - name: Install dependencies
        run: npm install

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build Debug APK
        id: build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tee gradle_output.txt
        continue-on-error: true

      - name: Upload gradle output
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: android/gradle_output.txt
          if-no-files-found: warn

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: aiqisao-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk