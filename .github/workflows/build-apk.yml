name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Debug Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "=== ls ANDROID_HOME ==="
          ls -la /usr/local/lib/android/sdk/ 2>&1 || echo "NOT FOUND"
          echo "=== ls alternate path ==="
          ls -la /usr/local/lib/android/ 2>&1 || echo "NOT FOUND"
          echo "=== which sdkmanager ==="
          which sdkmanager 2>&1 || echo "sdkmanager not in PATH"
          echo "=== find sdkmanager ==="
          find / -name "sdkmanager" -type f 2>/dev/null | head -5 || echo "not found"

      - name: Setup Android SDK
        run: |
          SDK_PATH="/usr/local/lib/android/sdk"
          # Try to find sdkmanager
          SDKMANAGER=$(find $SDK_PATH -name "sdkmanager" -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            # Try common alternative locations
            SDKMANAGER=$(find / -name "sdkmanager" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$SDKMANAGER" ]; then
            echo "Found sdkmanager at: $SDKMANAGER"
            yes | "$SDKMANAGER" --list 2>&1 | head -20
            yes | "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.1" 2>&1 | tail -10
          else
            echo "sdkmanager not found! Installing cmdline-tools..."
            curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q cmdline-tools.zip -d /tmp/android-cmd
            mkdir -p $SDK_PATH/cmdline-tools/latest
            mv /tmp/android-cmd/cmdline-tools/* $SDK_PATH/cmdline-tools/latest/
            yes | $SDK_PATH/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.1" 2>&1 | tail -10
          fi
      - name: Generate offline HTML
        run: node build_offline_html.js

      - name: Install dependencies
        run: npm install

      - name: Sync to Android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          npx cap sync android 2>&1

      - name: Build Debug APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aiqisao-debug
          path: android/app/build/outputs/**/*.apk
          if-no-files-found: warn