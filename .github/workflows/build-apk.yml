name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -3 || true

      - name: Generate offline HTML
        run: node build_offline_html.js

      - name: Install dependencies
        run: npm install

      - name: Sync to Android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties
          npx cap sync android 2>&1

      - name: Build Debug APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Locate and Upload APK
        run: |
          echo "=== All APK files ==="
          find android -name "*.apk" -type f 2>/dev/null || echo "NO APK"
          echo "=== Outputs tree ==="
          find android/app/build/outputs -type f 2>/dev/null || echo "no outputs"
          # Copy APK to a known location
          APK=$(find android -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            mkdir -p apk-out
            cp "$APK" apk-out/
            echo "APK copied: $APK"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aiqisao-debug
          path: apk-out/*.apk
          if-no-files-found: warn