name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDK_PATH="/usr/local/lib/android/sdk"
          SDKMANAGER=$(find $SDK_PATH -name "sdkmanager" -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER=$(find / -name "sdkmanager" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -5
          else
            curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q cmdline-tools.zip -d /tmp/android-cmd
            mkdir -p $SDK_PATH/cmdline-tools/latest
            mv /tmp/android-cmd/cmdline-tools/* $SDK_PATH/cmdline-tools/latest/
            yes | $SDK_PATH/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -5
          fi

      - name: Generate offline HTML
        run: node build_offline_html.js

      - name: Install dependencies
        run: npm install

      - name: Sync to Android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          npx cap sync android 2>&1

      - name: Build Debug APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aiqisao-debug
          path: android/app/build/outputs/**/*.apk
          if-no-files-found: warn
