name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate offline HTML
        run: node build_offline_html.js

      - name: Install dependencies
        run: npm install

      - name: Create local.properties
        run: |
          # MUST exist before cap sync, otherwise Gradle fails
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          cat android/local.properties

      - name: Verify SDK available
        run: |
          echo "SDK root: $ANDROID_SDK_ROOT"
          ls "$ANDROID_SDK_ROOT/platforms/"
          ls "$ANDROID_SDK_ROOT/build-tools/"

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiqisao-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk