name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          # Verify SDK path exists
          ls "$ANDROID_HOME" || echo "ANDROID_HOME does not exist!"
          # Install required SDK components
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.1" 2>&1 | tail -5
          # Verify installation
          ls "$ANDROID_HOME/platforms/" || echo "No platforms installed!"
          ls "$ANDROID_HOME/build-tools/" || echo "No build-tools installed!"

      - name: Generate offline HTML
        run: node build_offline_html.js

      - name: Install dependencies
        run: npm install

      - name: Sync to Android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          npx cap sync android 2>&1

      - name: Build Debug APK
        run: |
          # Ensure local.properties exists with correct SDK path
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cat android/local.properties
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aiqisao-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
