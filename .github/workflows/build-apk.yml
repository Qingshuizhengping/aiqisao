name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDK_DIR=$HOME/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools
          curl -sLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip
          unzip -q cmdline-tools.zip -d $SDK_DIR/cmdline-tools
          mv $SDK_DIR/cmdline-tools/cmdline-tools $SDK_DIR/cmdline-tools/latest
          echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
          echo "sdk.dir=$SDK_DIR" >> android/local.properties
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" 2>&1 | tail -3
          echo "SDK installed"

      - name: Generate offline HTML
        run: node build_offline_html.js

      - name: Install dependencies
        run: npm install

      - name: Sync and patch
        run: |
          npx cap sync android
          # cap sync resets to 36; patch to 35 which we actually installed
          sed -i '' 's/compileSdkVersion = 36/compileSdkVersion = 35/' android/variables.gradle
          sed -i '' 's/targetSdkVersion = 36/targetSdkVersion = 35/' android/variables.gradle

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aiqisao-debug
          path: android/app/build/outputs/apk/debug/*.apk